version: 1
name: network-only
description: >
  Network utilities and curl wrappers. Read system libraries only,
  no filesystem writes. Unrestricted outbound network.

filesystem:
  read:
    - /usr/lib
    - /usr/local/lib
    - /System/Library
  write: []
  deny:
    - (home)/.ssh/id_*

network:
  outbound:
    allow: true
  inbound:
    allow: false

process:
  allow_fork: true
  allow_exec_any: true

system:
  allow_sysctl_read: true
